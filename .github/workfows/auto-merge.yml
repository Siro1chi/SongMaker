name: Auto-merge bot PRs

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Проверяем, что PR создан именно вашим ботом
    if: |
      github.event.pull_request.user.login == 'qwen-chat-coder' ||
      github.event.pull_request.user.login == 'qwen-chat coder' ||
      contains(github.event.pull_request.title, 'qwen-chat coder') ||
      contains(github.event.pull_request.body, 'Created by qwen-chat coder')
    steps:
      - name: Enable auto-merge for this PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Add auto-merge label (optional)
        run: gh pr edit "$PR_URL" --add-label "auto-merge"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}